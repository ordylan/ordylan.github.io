<!DOCTYPE html>
<html>
  <head>

<link rel="stylesheet" href="ordylanlogin.css" type="text/css">

    <meta charset="utf-8">
    <title>橙子网_后台登录</title>
  </head> 

  <body>
	  <div>
    <div><h1>橙子网_后台登录</h1><a href="../../index.html">退出</li></a></div>
 
		<style>
			*{
				margin: 0;
				padding: 0;
				list-style-type: none;
			}
			.title{
				display: flex;
			}
			.container{
				width: 500px;
				border: 1px solid orange;
				margin: 100px auto;
			}
			.title{
				display: flex;
			}
			.title li{
				flex: 1;
				padding: 10px 0;
				text-align: center;
			}
			.title li.active{
				background-color: #FFA500;
				color: #FFFFFF;
			}
		</style>
		
			<div class="container">
			<ul class="title">
				<li class="active">登录</li>
				
				<li>GitHub</li>
				
				<li>onedrive</li>
			</ul>
			<ul class="content" style="padding: 10px;">
				<li><a href="index.html">请点击右边登录GitHub和onedrive,好了点击这里进入后台!(onedrive请使用ordylan.onmicrosoft.com后缀的邮箱登录)</a></li>
				<li style="display: none;"><a href="https://github.com/login" target="_blank">点击登录</li></a></li>
				<li style="display: none;"><a href="https://www.office.com/" target="_blank">点击登录</li></a></li>
			</ul>
		</div>


		<script>
			let title = document.getElementsByClassName('title')[0]
			let content = document.getElementsByClassName('content')[0]
			let titlelist = title.children
			let contentlist = content.children
			for(let i = 0; i < titlelist.length; i++){
				let item = titlelist[i];
				item.onclick = () => {
					let active = title.getElementsByClassName('active')[0]
					active.classList.remove('active')
					item.classList.add("active")
					
					
					for(let j = 0; j < titlelist.length; j++){
					contentlist[j].style.display = "none"
					}
					contentlist[i].style.display = "block"
				}
			}
		</script>
</div> 



	 
		  </div>

  </body>
</html>
