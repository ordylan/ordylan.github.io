<script type="text/javascript">
	window.onload = function(){
		var time = 10;
		var secondEle = document.getElementById("second");
		var timer = setInterval(function(){
			secondEle.innerHTML = time;
			time--;
			if(time==0){
				clearInterval(timer);
				location.href="../index.html";
			}
				
		},1000);
	}
</script>
